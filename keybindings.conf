
###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier
$subMod = LALT  # Sets "right alt" key as extend modifier
#$extend = CAPS

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
$editor = code
$browser = firefox
$menu = wofi --show drun
$sysMonitor = btop
$lockScreen = swaylock
$screenShot = grim
$screenCapture = grim -g "$(slurp)"

#           _                 _ 
#  _____  _| |_ ___ _ __   __| |
# / _ \ \/ / __/ _ \ '_ \ / _` |
#|  __/>  <| ||  __/ | | | (_| |
# \___/_/\_\\__\___|_| |_|\__,_|
#                               

# Scroll through existing workspaces with mainMod + scroll
bind = $subMod, I, workspace, e+1
bind = $subMod, N, workspace, e-1

# Move to the first empty workspace
bind = $subMod, E, workspace, empty ace, e-1

# Resize windows
binde = $subMod+Shift, Right, resizeactive, 30 0
binde = $subMod+Shift, Left, resizeactive, -30 0
binde = $subMod+Shift, Up, resizeactive, 0 -30
binde = $subMod+Shift, Down, resizeactive, 0 30

binde = $subMod+Shift, I, resizeactive, 30 0
binde = $subMod+Shift, N, resizeactive, -30 0
binde = $subMod+Shift, U, resizeactive, 0 -30
binde = $subMod+Shift, E, resizeactive, 0 30

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more

bind = $subMod, Space, exec, pkill wofi || $menu
bindd = $mainMod Shift, P,Color Picker , exec, hyprpicker -a # Pick color (Hex) >> clipboard# 
bind = $mainMod, T, exec, $terminal
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, C, exec, $editor # launch text editor
bind = $mainMod, F, exec, $browser # launch web browser
bind = $mainMod, Q, killactive,
bind = Alt, F4, killactive,
bind = $mainMod, M, fullscreen,
bind = $mainMod, H, exec, systemctl hibernate
bind = $mainMod, L, exec, $lockscreen

bind = $mainMod, PRINT, exec, $screenShot
bind = $subMod, PRINT, exec, $screeShot - | wl-copy
bind = $mainMod  SHIFT, C, exec, $screenCapture
bind = $subMod , PRINT, exec, $screenShot - | wl-copy
bind = $mainMod, R, exec, wf-recorder -g "$(slurp)" -f ~/Videos/$(date +'%Y-%m-%d-%H%M%S_recording.mp4')
bind = $subMod, R, exec, wf-recorder -f ~/Videos/$(date +'%Y-%m-%d-%H%M%S_recording.mp4')
bind = SUPER SHIFT, R, exec, killall -s SIGINT wf-recorder

bind = $mainMod, Delete, exit, # kill hyprland session
bind = $mainMod, D, exec, $fileManager
bind = $mainMod, R, exec, $terminal ranger
bind = $mainMod, V, togglefloating,
bind = $mainMod, W, togglefloating,
bind = Ctrl+Alt, W, exec, pkill waybar || waybar # toggle waybar
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, togglesplit, # dwindle

bind = $mainMod, G, togglegroup, # toggle the window between

# Move between grouped windows
bind = $subMod SHIFT, N, changegroupactive, b
bind = $subMod SHIFT, I, changegroupactive, f focus and group

bind = Ctrl+Shift, Escape, exec, $terminal $sysMonitor  # launch system monitor

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, N, movefocus, l
bind = $mainMod, I, movefocus, r
bind = $mainMod, U, movefocus, u
bind = $mainMod, E, movefocus, d
bind = Alt, Tab, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move focused window to a relative workspace
bind = $mainMod SHIFT, Right, movetoworkspace, r+1
bind = $mainMod SHIFT, Left, movetoworkspace, r-1

bind = $mainMod SHIFT, I, movetoworkspace, r+1
bind = $mainMod SHIFT, N, movetoworkspace, r-1

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1



# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

